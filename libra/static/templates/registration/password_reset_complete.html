{% extends 'main/base.html' %}
{% load static i18n %}

{% block title %}{% trans "Пароль обновлён" %}{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card auth-card rounded-4 shadow-sm overflow-hidden">
                    <div class="card-body p-5 text-center">
                        <h2 class="mb-4">{% trans "Пароль успешно обновлён" %}</h2>
                        <p class="mb-4">{% trans "Теперь вы можете войти в свой аккаунт с новым паролем." %}</p>
                        <a class="btn btn-primary btn-lg" href="{% url 'login' %}">{% trans "Войти" %}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
